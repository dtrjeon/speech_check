<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시트 역동기화 (chapters-data.js → Google Sheet)</title>
<style>
  body{font-family:-apple-system,sans-serif;max-width:640px;margin:24px auto;padding:0 16px;color:#222;}
  h1{font-size:18px;}

  label{display:block;margin:10px 0 4px;font-size:13px;font-weight:600;}
  input{width:100%;padding:8px;box-sizing:border-box;font-size:14px;border:1px solid #ccc;border-radius:6px;}

</head>
<body>
<h1>구글시트 역동기화 도구</h1>
<p class="desc">
  현재 <code>chapters-data.js</code>에 저장된 타임스탬프(ts) 값을 구글시트(<code>ts_ch{id}</code> 탭)로 그대로 밀어넣습니다.<br>
  CLOVA 재추출은 하지 않으며, 이미 파일에 있는 완전한 값을 시트에 반영해서 admin.html의 "N개 완료" 표시와 파일을 일치시키는 1회성 작업입니다.<br>
  9개 챕터(1~8, 10) 전부 대상이며, 각 챕터마다 기존 시트 데이터는 덮어쓰기 됩니다.
</p>

<label>관리자 이름</label>
<input id="admin-name" placeholder="예: 전태룡">
<label>관리자 비밀번호</label>
<input id="admin-pw" type="password" placeholder="비밀번호">

<div id="ch-list"></div>

<button id="run-btn">전체 챕터 동기화 실행</button>
<div id="log"></div>

 (부모 공경, 이웃 사랑처럼) 해야 하는 것을 하지 않는 것도 역시 죄이며,"},{"idx":6,"ts":44.7,"text":"셋째, (교만, 탐심, 미움, 질투처럼) 나쁜 마음이나 나쁜 생각을 하는 것도 죄입니다."},{"idx":7,"ts":52.2,"text":"그러나, 무엇보다도 하나님을 하나님으로 믿지 않는 것이 가장 큰 죄입니다."},{"idx":8,"ts":59.6,"text":"이런 기준으로 볼 때 (선생님)은 하루에 몇 번 정도 죄를 짓는다고 생각하세요."},{"idx":9,"ts":67.1,"text":"물론 저도 그래요. 사실 우리는 자신도 모르게 많은 죄를 지으며 살지요."},{"idx":10,"ts":74.6,"text":"성경의 기준으로 볼 때 어떤 사람이 하루에 열 번이나 다섯 번, 아니 단지 세 번만 죄를 짓는다고 생각해 보십시다."},{"idx":11,"ts":82,"text":"그 사람은 걸어 다니는 천사라고 할 수 있을 것입니다."},{"idx":12,"ts":89.5,"text":"그러나 그런 천사와 같은 자라도 하루 세 번씩, 일 년이면 천 번 이상, 90평생을 산다면 9만 번 이상의 죄를 짓게 되는 셈이지요."},{"idx":13,"ts":96.9,"text":"그래서 이 세상에서 자신은 죄인이 아니라고 주장할 수 있는 사람은 단 한 사람도 없습니다."},{"idx":14,"ts":104.4,"text":"주제 전환 그렇다면 이런 죄인이 어떻게 영생을 선물로 받을 수 있을까요."},{"idx":15,"ts":111.8,"text":"이것은 성경이 하나님에 관하여 하신 말씀을 잘 이해할 때 좀 더 분명히 알 수 있습니다."}],"4":[{"idx":0,"ts":0,"text":"1 하나님은 자비로우셔서 우리를 벌하시는 것을 원치 않으십니다."},{"idx":1,"ts":9.8,"text":"2 (하지만) 하나님은 의로우시기 때문에 반드시 우리 죄를 벌하셔야만 합니다."},{"idx":2,"ts":19.5,"text":"성경은 \" 하나님은 사랑이심이라\" 라고 말씀하십니다. 하지만 \" 벌을 면제하지는 아니하고 보응하리라\" 라고 말씀하십니다."},{"idx":3,"ts":29.3,"text":"전쟁 중인 러시아제국에서 부족한 식량을 훔치는 사건이 종종 발생했습니다."},{"idx":4,"ts":39.1,"text":"화가 난 지휘관 가르시아 장군은 누구든지 식량을 훔치다 잡힌 사람에게는 끔찍한 채찍질을 가하겠다고 선포했습니다."},{"idx":5,"ts":48.8,"text":"그런데 도둑을 잡고 보니 다른 사람이 아닌 그의 어머니였습니다."},{"idx":6,"ts":58.6,"text":"장군은 원칙대로 사랑하는 어머니에게 채찍질을 가하자니 늙으신 어머님이 돌아가실 것 같고, 원칙을 무시하고 그냥 넘어가자니 부하들에게 군기가 서지 않을 것 같았습니다."},{"idx":7,"ts":68.3,"text":"결국 지휘관이 만든 원칙에 따라 처벌해야 하는 날 그는 어머니 앞에서 겉옷을 벗었습니다."},{"idx":8,"ts":78.1,"text":"그리고 부하들에게 명했습니다. \"어머니 대신 나에게 채찍을 가하라!\""},{"idx":9,"ts":87.9,"text":"그는 어머니 대신 채찍에 맞음으로써 어머니를 향한 사랑을 실천했을 뿐만 아니라 동시에 죄인을 처벌하는 공의도 실천하게 된 것입니다. 이처럼"},{"idx":10,"ts":97.6,"text":"주제 전환 자비로우시고 의로우신 하나님은 우리의 죄 문제를 예수 그리스도 안에서 단번에 해결하셨습니다."}],"5":[{"idx":0,"ts":0,"text":"1 예수 그리스도는 참 하나님이신 동시에 참 인간이십니다."},{"idx":1,"ts":9.3,"text":"2 예수 그리스도는 우리에게 영생을 선물로 주시기 위하여 십자가에서 죽으심으로 우리의 모든 죗값을 대신 치르시고 부활하셨습니다."},{"idx":2,"ts":18.6,"text":"이 책이 제가 태어나서 지금까지 지은 모든 죄와 모든 생각, 모든 말, 모든 행위가 낱낱이 기록되어 있는 책이라고 생각해 보십시다."},{"idx":3,"ts":27.9,"text":"성경은 어느 날 이 책이 하나님 앞에 펼쳐지고 제가 행한 대로 심판을 받게 될 것이라고 말씀하십니다."},{"idx":4,"ts":37.3,"text":"그런데 바로 이 책에 기록된 저의 죄가 문제입니다."},{"idx":5,"ts":46.6,"text":"하나님은 저를 사랑하시기 때문에 저를 벌하시는 것을 원치 않으시고 또한 하나님은 의로우시기 때문에 반드시 저의 죄를 벌하셔야만 합니다."},{"idx":6,"ts":55.9,"text":"이 문제를 해결하기 위하여 하나님은 그의 사랑하시는 아들 예수 그리스도를 이 세상에 보내셨습니다."},{"idx":7,"ts":65.2,"text":"성경은 \"우리는 다 양 같아서 그릇 행하여 각기 제 길로 갔거늘 여호와께서는 우리 모두의 죄악을 그에게 예수 그리스도에게 담당시키셨도다\" 라고 말씀하십니다."},{"idx":8,"ts":74.5,"text":"하나님이 미워하시는 저의 모든 죄가 그의 사랑하시는 아들 예수 그리스도께로 옮겨졌습니다."},{"idx":9,"ts":83.8,"text":"십자가 위에서 우리의 모든 죗값이 다 치러졌을 때 예수 그리스도께서는 \"다 이루었다\" 라고 말씀하셨습니다."},{"idx":10,"ts":93.1,"text":"예수 그리스도는 우리의 모든 죗값을 대신 치르신 후 사흘 만에 부활하셔서 우리에게 영생을 선물로 주시기 위하여 승천하셨습니다."},{"idx":11,"ts":102.4,"text":"지금 예수님은 영생을 선물로 주시고자 하십니다."},{"idx":12,"ts":111.8,"text":"그렇다면 우리가 이 영생의 선물을 어떻게 받을 수가 있을까요."},{"idx":13,"ts":121.1,"text":"주제 전환 이 영생의 선물은 오직 예수 그리스도를 믿음으로 받습니다."},{"idx":14,"ts":130.4,"text":"그러나 중요한 사실은"}],"6":[{"idx":0,"ts":0,"text":"1 단순한 지식적 동의와 일시적, 현세적 믿음은 구원받는 믿음이 아닙니다."},{"idx":1,"ts":11.4,"text":"2 구원받는 참 믿음은 우리의 구원을 위해서 오직 예수 그리스도만을 신뢰하는 것입니다."},{"idx":2,"ts":22.9,"text":"성경은 \" 주 예수를 믿으라. 그리하면 너와 네 집이 구원을 받으리라\" 라고 말씀하십니다."},{"idx":3,"ts":34.3,"text":"구원받는 참 믿음이 무엇인지 이 의자를 가지고 설명하겠습니다."},{"idx":4,"ts":45.7,"text":"여기 의자가 있다는 사실을 알고 계시지요."},{"idx":5,"ts":57.2,"text":"그러나 단순히 의자가 여기 있다는 것만 알고 앉지 않는다면 여기 있는 의자가 저에게 무슨 소용이 있겠습니까."},{"idx":6,"ts":68.6,"text":"송구한 말씀이지만 이 의자를 예수님이라고 가정해 보십시다."},{"idx":7,"ts":80,"text":"의자가 편하게 해줄 것을 알면서도 의자 옆에 서 있기만 하듯이, 예수 그리스도가 구원자란 사실을 머리로만 알고, 예수 그리스도를 신뢰하지 않는다면 그 믿음은 단순히 지식적인 동의에 불과하므로 우리 자신을 구원하는 믿음이 아닙니다."},{"idx":8,"ts":91.5,"text":"또한 예수 그리스도를 건강문제, 재정문제, 자녀문제 등 일시적이고 현세적인 문제들만 해결할 분으로 알고 각종 문제들은 예수그리스도께 부탁드리면서도 자신은 여전히 예수 그리스도를 신뢰하지 않는다면 그 믿음은 일시적, 현세적 문제만을 해결하려는 믿음으로, 우리 자신을 구원하는 믿음이 아닙니다."},{"idx":9,"ts":102.9,"text":"성경이 가르치는 구원받는 참 믿음은 자신의 모든 문제를 가지고 이처럼 자기 자신이 예수님을 온전히 신뢰하는 것을 말합니다."},{"idx":10,"ts":114.3,"text":"어느 날 저는 제 삶의 모든 문제를 안은 채로 저 자신을 예수 그리스도께 맡겼습니다."},{"idx":11,"ts":125.7,"text":"비로소 저는 영생을 선물로 받게 되었습니다."},{"idx":12,"ts":137.2,"text":"얼마나 평안하고 기뻤는지 몰라요."},{"idx":13,"ts":148.6,"text":"전: (선생님), 앞에서 (선생님)은 영생을 얻어 천국에 들어가는 이유가 (선한 행위)라고 하셨죠."},{"idx":14,"ts":160,"text":"전: 그렇다면 선생님은 영생을 얻어 천국에 들어가려고 결국 누구를 신뢰하고 계셨던 것일까요."},{"idx":15,"ts":171.5,"text":"주제 전환 (선생님)께서 영생을 선물로 받고 천국에 들어가려면 신뢰의 대상을 자신의 (선한 행위)로부터 오직 예수 그리스도께로 옮기셔야만 합니다."}],"7":[{"idx":0,"ts":0,"text":"지금까지 제가 성경의 핵심 내용을 요약해서 말씀드렸습니다. (선생님), 이해가 되십니까."},{"idx":1,"ts":14.1,"text":"지금 이 시간 온 우주 만물을 창조하신 하나님께서 (선생님)께 \"사랑하는 아들아[딸아], 내가 너에게 이 영생의 선물을 주려고 하는데 받겠느냐\" 라고 물으신다면 (선생님)은 이 영생의 선물을 받기를 원하십니까."},{"idx":2,"ts":28.3,"text":"(선생님), 참으로 중요한 결정을 하셨습니다. 이제 (선생님)의 결정이 무엇을 뜻하는지 간단히 말씀드리겠습니다."},{"idx":3,"ts":42.4,"text":"1 첫째, 영생을 얻기 위하여 자신을 신뢰하지 않고 오직 예수 그리스도만을 신뢰하겠다는 뜻입니다."},{"idx":4,"ts":56.5,"text":"2 둘째, 부활하여 살아계신 예수 그리스도를 구원자로, 삶의 주인으로 모시겠다는 뜻입니다."},{"idx":5,"ts":70.6,"text":"3 셋째, 자신이 지었던 죄를 회개하고 삶의 방향을 하나님께로 돌리겠다는 뜻입니다. 그렇게 하기를 원하십니까."},{"idx":6,"ts":84.8,"text":"(선생님) 하나님께서는 우리의 기도에 귀를 기울여 들어주십니다. 저를 따라서 하나님께 한 마디씩 기도해 주세요."},{"idx":7,"ts":98.9,"text":"하나님 아버지 / 지금까지 저는 / 제 자신을 믿고 살아온 죄인입니다. / 저의 죄를 회개하오니 / 용서해 주십시오. / 예수님이 저의 죄 때문에 / 십자가에서 죽으시고 / 부활하신 것을 믿습니다. / 지금 이 시간 / 제 마음의 문을 엽니다. / 예수님이 제 마음에 들어오셔서 / 저의 구원자와 / 삶의 주인이 되어 주십시오. / 이제부터 제가 / 하나님 앞에 설 때까지 / 저의 삶을 인도해 주십시오. / 예수님의 이름으로 기도드립니다. / 아멘!"},{"idx":8,"ts":113,"text":"제가 (선생님)을 위하여 기도하겠습니다."},{"idx":9,"ts":127.1,"text":"하나님 아버지, 감사합니다. \"영접하는 자 곧 그 이름을 믿는 자들에게는 하나님의 자녀가 되는 권세를 주신다.\" 라는 말씀대로 (선생님)이 하나님의 자녀가 되게 해 주셔서 감사드립니다."},{"idx":10,"ts":141.3,"text":"\"동이 서에서 먼 것 같이 네 죄를 멀리 옮기었느니라 다시는 네 죄를 기억지 아니하리라\" 라는 말씀대로 (선생님)에게 죄 용서의 확신을 주시고, \"나를 믿는 자는 멸망치 않고 영생을 얻으리라.\" 라는 말씀대로 (선생님)에게 구원의 확신을 주시옵소서."},{"idx":11,"ts":155.4,"text":"예수님의 이름으로 기도드립니다. 아멘!"},{"idx":12,"ts":169.5,"text":"이제 (선생님)이 지금 기도하신 일이 무엇을 뜻하는지 예수 그리스도께서 하신 말씀을 읽어 주시면 좋겠습니다. 여기를 읽어 주시겠어요."},{"idx":13,"ts":183.6,"text":"(예수 그리스도를) 믿는 자는 무엇을 가졌다고 했나요."},{"idx":14,"ts":197.8,"text":"영생을 가질 것이라고 했나요. 아니면 이미 가졌다고 했나요."},{"idx":15,"ts":211.9,"text":"여기 '너희'에게와 (예수 그리스도를) 믿는 '자' 에 (선생님)의 이름을 넣어서 읽어주시겠어요."},{"idx":16,"ts":226,"text":"이 말씀에 근거해서 한 번 더 질문을 드리겠습니다."},{"idx":17,"ts":240.1,"text":"(선생님), 이 말씀에 근거해서 (선생님)은 영생을 얻었기에 만일 오늘이라도 이 세상을 떠나신다면 천국에 들어간다는 것을 확신하시는지요."},{"idx":18,"ts":254.3,"text":"(선생님), 이 말씀에 근거해서 (선생님)은 천국에 들어갈 수 있는 이유가 무엇이라고 생각하십니까."}],"8":[{"idx":0,"ts":0,"text":"오늘 (선생님)이 예수 그리스도를 믿고 영생을 얻어 하나님의 자녀가 되신 것을 축하드립니다."},{"idx":1,"ts":16.4,"text":"이것은 (선생님)께 드리려고 가져 온 책인데요. 여기에는 제가 방금 말씀드린 내용이 간단히 요약되어 있고 또한 (선생님)의 믿음이 성장하는데 도움이 될 내용이 있습니다."},{"idx":2,"ts":32.9,"text":"먼저 여기 '나의 결정'을 읽어 주시겠습니까."},{"idx":3,"ts":49.3,"text":"네. 감사합니다. 이것이 오늘 (선생님)의 결정이시죠."},{"idx":4,"ts":65.7,"text":"여기에 오늘 날짜를 쓰시고 (선생님)이 직접 서명해 주시겠어요."},{"idx":5,"ts":82.2,"text":"저도 증인으로서 서명하겠습니다. 그리고 제 연락처도 적어드리겠습니다. 신앙생활에 도움이 필요할 때는 언제든 연락 주십시오."},{"idx":6,"ts":98.6,"text":"(선생님) 아기가 태어나면 잘 자라야 부모의 마음이 기쁜 것처럼 (선생님)도 지금 영적으로 갓 태어난 생명과 같기 때문에 하나님은 (선생님)의 믿음이 성장하기를 원하십니다. 여기에 믿음이 잘 자라는데 도움이 되는 '신앙성장의 다섯 가지 방안'이 적혀 있는데 같이 보시지요."},{"idx":7,"ts":115,"text":"여기 진한 글씨를 읽어 주시겠어요. 첫째, 성경"},{"idx":8,"ts":131.4,"text":"성경은 영혼의 양식입니다. 우리가 밥을 잘 먹어야 몸이 건강하게 되듯이 하나님의 말씀을 잘 읽어야 우리의 영혼이 건강해질 수 있지요. 제가 요한복음을 한 권 드리고 가겠습니다. 하루에 한 장씩 읽어 보세요. 괜찮으시면 제가 일주일 후 다시 찾아뵙고 싶은데요. 그때 질문이 있으시면 도와드리겠습니다."},{"idx":9,"ts":147.9,"text":"둘째, 기도"},{"idx":10,"ts":164.3,"text":"기도는 영혼의 호흡입니다. 하나님의 자녀는 기도를 통해 하나님과 교제할 수 있어요. 이렇게 하시면 기도를 쉽게 배울 수 있습니다. 저와 같이 두 손을 모아보세요."},{"idx":11,"ts":180.7,"text":"첫째 손가락 — \"하나님 아버지\" 맨 먼저 기도할 때 제일 중요한 것은 기도의 대상입니다. 하나님이 이제는 (선생님)의 영적 아버지가 되십니다. 그래서 먼저 \"하나님 아버지!\"라고 부르시는 겁니다."},{"idx":12,"ts":197.2,"text":"둘째 손가락 — \"감사합니다\" 하나님께서는 감사를 기뻐하십니다. 영생의 선물을 주신 것도 감사하고, 건강 주신 것도 감사하고, 감사한 일들을 말씀드리면 됩니다."},{"idx":13,"ts":213.6,"text":"셋째 손가락 — \"용서해 주세요\" 하나님께서는 우리의 잘못을 용서해 주시기를 원하십니다. 실수하고 잘못한 것을 하나님께 다 용서해 달라고 말씀드리세요."},{"idx":14,"ts":230,"text":"넷째 손가락 — \"도와주세요\" 하나님께서는 우리를 도와주시기를 원하십니다. 우리 연약한 인생은 하나님의 도우심 없이는 살 수가 없습니다. 필요한 것을 다 말씀하시면 하나님께서 들어주십니다."},{"idx":15,"ts":246.5,"text":"다섯째 손가락 — \"예수님의 이름으로 기도드립니다. 아멘!\" 예수님의 이름으로 기도하면 응답해 주시겠다고 약속하셨습니다. '아멘'은 '동의합니다' 또는 '기도한 대로 이루어지기를 원합니다'라는 뜻입니다. (선생님)도 이렇게 기도하실 수 있겠지요."},{"idx":16,"ts":262.9,"text":"다시 한 번 해 볼까요. 하나님 아버지/ 감사합니다/ 용서해 주세요/ 도와주세요/ 예수님의 이름으로 기도드립니다. 아멘!"},{"idx":17,"ts":279.3,"text":"참 잘하셨습니다."},{"idx":18,"ts":295.8,"text":"셋째, 예배"},{"idx":19,"ts":312.2,"text":"예배란 구원 받은 성도가 함께 모여서 하나님을 찬양하고 경배 드리는 것입니다. (선생님), 이번 주일은 (선생님)과 오전 11시 예배를 함께 드리고 싶어요. 괜찮으시다면 제가 10시 30분에 댁 앞으로 모시러 오겠습니다."},{"idx":20,"ts":328.6,"text":"넷째, 교제"},{"idx":21,"ts":345.1,"text":"(선생님), 교제란 믿는 그리스도인들과의 사귐을 뜻합니다. 믿음의 교제 역시 매우 중요합니다. 그래서 우리 교회에서는 (선생님)처럼 처음 나오신 분들을 위해서 새가족 모임을 운영하고 있어요. 원하신다면 이번 주부터 참여하실 수 있도록 제가 안내하겠습니다. 이런 모임에 참여하면 믿음이 잘 자랄 수 있습니다."},{"idx":22,"ts":361.5,"text":"마지막으로 전도"},{"idx":23,"ts":377.9,"text":"전도를 하셔야 우리의 신앙이 건강하게 성장합니다. 전도란 내가 받은 구원의 기쁜 소식을 다른 사람과 함께 나누는 것입니다. 하나님의 구원 역사는 믿는 사람이 안 믿는 사람에게 또 예수님을 아는 사람이 모르는 사람에게 전함으로 이루어지고 있습니다. 혹시 오늘 들으신 기쁜 소식을 전하고 싶은 분이 있으십니까."},{"idx":24,"ts":394.3,"text":"전하는 것이 어려우시면 저희가 도와드릴게요. 그분 외에도 이 소식을 전하고 싶은 분이 더 있으면 저희에게 연락 주세요. 저희가 방문해서 이 소식을 전해드리겠습니다."},{"idx":25,"ts":410.8,"text":"네, 그러면 이번 주일 오전 10시 30분에 댁 앞으로 모시러 오겠습니다."},{"idx":26,"ts":427.2,"text":"(선생님), (선생님)과 함께 제가 기도드리고 이제 자리에서 일어나겠습니다. 혹시 함께 기도하실 제목이 있으신지요."},{"idx":27,"ts":443.6,"text":"그럼 제가 기도하겠습니다. \"하나님 아버지, 오늘 (선생님)과 귀한 교제를 나누게 해 주셔서 감사합니다. 앞으로 (선생님)의 믿음이 건강하게 자라도록 도와주세요. 이번 주일에 만나서 함께 예배드릴 때 기쁨이 넘치게 해주세요. 예수님 이름으로 기도드립니다. 아멘!\""},{"idx":28,"ts":460.1,"text":"이렇게 오랜 시간 저희 이야기를 끝까지 들어주셔서 감사합니다. 안녕히 계십시오."}],"10":[{"idx":0,"ts":0,"text":"주제 전환 선생님 제가 질문 하나 드려도 되겠습니까."},{"idx":1,"ts":5.7,"text":"선생님께서 만일 오늘이라도 이 세상을 떠나신다면 천국에 들어간다는 것을 확신하고 계십니까."},{"idx":2,"ts":11.3,"text":"선생님은 어떻게 하면 영생을 얻어 천국에 들어갈 수 있다고 생각하십니까."},{"idx":3,"ts":17,"text":"주제 전환 선생님의 대답을 듣고 보니 선생님께 가장 기쁜 소식을 전해드릴 수 있겠군요."},{"idx":4,"ts":22.6,"text":"그 기쁜 소식은"},{"idx":5,"ts":28.3,"text":"1 영생은 값없이 주시는 하나님의 선물입니다."},{"idx":6,"ts":34,"text":"2 그러므로 영생은 돈이나 공로나 자격으로 얻는 것이 아닙니다."},{"idx":7,"ts":39.6,"text":"성경은 너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 이것은 너희에게서 난 것이 아니요 하나님의 선물이라 행위에서 난 것이 아니니 이는 누구든지 자랑하지 못하게 함이라라고 말씀하십니다."},{"idx":8,"ts":45.3,"text":"주제 전환 그렇다면 하나님은 영생을 왜 선물로 주셔야만 할까요."},{"idx":9,"ts":50.9,"text":"이것은 성경이 인간에 관하여 하신 말씀을 잘 이해할 때 좀 더 분명히 알 수 있습니다."},{"idx":10,"ts":56.6,"text":"1 인간은 죄인입니다."},{"idx":11,"ts":62.3,"text":"2 그러므로 죄인은 자신을 구원할 수 없습니다."},{"idx":12,"ts":67.9,"text":"주제 전환 그렇다면 이런 죄인이 어떻게 영생을 선물로 받을 수 있을까요."},{"idx":13,"ts":73.6,"text":"이것은 성경이 하나님에 관하여 하신 말씀을 잘 이해할 때 좀 더 분명히 알 수 있습니다."},{"idx":14,"ts":79.2,"text":"1 하나님은 자비로우셔서 우리를 벌하시는 것을 원치 않으십니다."},{"idx":15,"ts":84.9,"text":"2 하지만 하나님은 의로우시기 때문에 반드시 우리 죄를 벌하셔야만 합니다."},{"idx":16,"ts":90.5,"text":"주제 전환 자비로우시고 의로우신 하나님은 우리의 죄 문제를 예수 그리스도 안에서 단번에 해결하셨습니다."},{"idx":17,"ts":96.2,"text":"1 예수 그리스도는 참 하나님이신 동시에 참 인간이십니다."},{"idx":18,"ts":101.9,"text":"2 예수 그리스도는 우리에게 영생을 선물로 주시기 위하여 십자가에서 죽으심으로 우리의 모든 죗값을 대신 치르시고 부활하셨습니다."},{"idx":19,"ts":107.5,"text":"지금 예수님은 영생을 선물로 주시고자 합니다."},{"idx":20,"ts":113.2,"text":"그렇다면 우리가 이 영생의 선물을 어떻게 받을 수 있을까요."},{"idx":21,"ts":118.8,"text":"주제 전환 이 영생의 선물은 오직 예수 그리스도를 믿음으로 받습니다."},{"idx":22,"ts":124.5,"text":"그러나 중요한 사실은"},{"idx":23,"ts":130.2,"text":"1 단순한 지식적 동의와 일시적 현세적 믿음은 구원받는 믿음이 아닙니다."},{"idx":24,"ts":135.8,"text":"2 구원받는 참 믿음은 우리의 구원을 위해서 오직 예수 그리스도만을 신뢰하는 것입니다."},{"idx":25,"ts":141.5,"text":"성경은 주 예수를 믿으라 그리하면 너와 네 집이 구원을 받으리라 라고 말씀하십니다."},{"idx":26,"ts":147.1,"text":"주제 전환 선생님께서 영생을 선물로 받고 천국에 들어가려면 신뢰의 대상을 자신의 선한 행위로부터 오직 예수 그리스도께로 옮기셔야만 합니다."},{"idx":27,"ts":152.8,"text":"선생님 이해가 되십니까."},{"idx":28,"ts":158.5,"text":"선생님 이 영생의 선물을 받기를 원하십니까."},{"idx":29,"ts":164.1,"text":"선생님 참으로 중요한 결정을 하셨습니다."},{"idx":30,"ts":169.8,"text":"이제 선생님의 결정이 무엇을 뜻하는지 간단히 말씀드리겠습니다."},{"idx":31,"ts":175.4,"text":"첫째 영생을 얻기 위하여 자신을 신뢰하지 않고 오직 예수 그리스도만을 신뢰하겠다는 뜻입니다."},{"idx":32,"ts":181.1,"text":"둘째 부활하여 살아계신 예수 그리스도를 구원자로 삶의 주인으로 모시겠다는 뜻입니다."},{"idx":33,"ts":186.8,"text":"셋째 자신이 지었던 죄를 회개하고 삶의 방향을 하나님께로 돌리겠다는 뜻입니다."},{"idx":34,"ts":192.4,"text":"그렇게 하기를 원하십니까."},{"idx":35,"ts":198.1,"text":"선생님 하나님께서는 우리의 기도에 귀를 기울여 들어주십니다."},{"idx":36,"ts":203.7,"text":"저를 따라서 하나님께 한 마디씩 기도해 주세요."},{"idx":37,"ts":209.4,"text":"하나님 아버지"},{"idx":38,"ts":215.1,"text":"지금까지 저는"},{"idx":39,"ts":220.7,"text":"제 자신을 믿고 살아온 죄인입니다."},{"idx":40,"ts":226.4,"text":"저의 죄를 회개하오니"},{"idx":41,"ts":232,"text":"용서해 주십시오."},{"idx":42,"ts":237.7,"text":"예수님이 저의 죄 때문에"},{"idx":43,"ts":243.4,"text":"십자가에서 죽으시고"},{"idx":44,"ts":249,"text":"부활하신 것을 믿습니다."},{"idx":45,"ts":254.7,"text":"지금 이 시간"},{"idx":46,"ts":260.3,"text":"제 마음의 문을 엽니다."},{"idx":47,"ts":266,"text":"예수님이 제 마음에 들어오셔서"},{"idx":48,"ts":271.6,"text":"저의 구원자와"},{"idx":49,"ts":277.3,"text":"삶의 주인이 되어주십시오."},{"idx":50,"ts":283,"text":"이제부터 제가"},{"idx":51,"ts":288.6,"text":"하나님 앞에 설 때까지"},{"idx":52,"ts":294.3,"text":"저의 삶을 인도해 주십시오."},{"idx":53,"ts":299.9,"text":"예수님의 이름으로 기도드립니다."},{"idx":54,"ts":305.6,"text":"아멘!"},{"idx":55,"ts":311.3,"text":"이제 선생님이 지금 기도하신 일이 무엇을 뜻하는지 예수 그리스도께서 하신 말씀을 읽어 주시면 좋겠습니다."},{"idx":56,"ts":316.9,"text":"선생님, 이 말씀에 근거해서 선생님은 영생을 얻었기에 만일 오늘이라도 이 세상을 떠나신다면 천국에 들어간다는 것을 확신하시는지요."},{"idx":57,"ts":322.6,"text":"선생님, 이 말씀에 근거해서 선생님은 천국에 들어갈 수 있는 이유가 무엇이라고 생각하십니까."},{"idx":58,"ts":328.2,"text":"오늘 선생님이 예수 그리스도를 믿고 영생을 얻어 하나님의 자녀가 되신 것을 축하드립니다."}]};
const CH_TITLES = {1:'서론(아니요)',2:'은혜',3:'인간',4:'하나님',5:'그리스도',6:'믿음',7:'결신',8:'즉석양육',10:'요약 복음'};

// 로그인 정보는 admin.html과 동일한 localStorage 키를 재사용 (같은 브라우저에서 admin.html에 이미 로그인했다면 자동 채움)
try {
  const s = localStorage.getItem('admin_cred');
  if (s) {
    const c = JSON.parse(s);
    document.getElementById('admin-name').value = c.name || '';
    document.getElementById('admin-pw').value = c.pw || '';
  }
} catch(e) {}

const chIds = Object.keys(PAYLOAD).map(Number).sort((a,b)=>a-b);
const listEl = document.getElementById('ch-list');
listEl.innerHTML = chIds.map(id =>
  '<div class="ch-row" id="row-'+id+'"><span>'+id+'장 '+CH_TITLES[id]+' ('+PAYLOAD[id].length+'줄)</span><span class="st wait" id="st-'+id+'">대기</span></div>'
).join('');

function log(msg){
  const el = document.getElementById('log');
  const now = new Date().toLocaleTimeString('ko-KR');
  el.textContent += '['+now+'] '+msg+'\n';
  el.scrollTop = el.scrollHeight;
}

function setStatus(id, cls, text){
  const el = document.getElementById('st-'+id);
  el.className = 'st '+cls;
  el.textContent = text;
}

document.getElementById('run-btn').addEventListener('click', async () => {
  const name = document.getElementById('admin-name').value.trim();
  const pw = document.getElementById('admin-pw').value.trim();
  if(!name || !pw){ alert('관리자 이름/비밀번호를 입력하세요.'); return; }
  document.getElementById('run-btn').disabled = true;
  log('동기화 시작 — 총 '+chIds.length+'개 챕터');

  for (const id of chIds) {
    setStatus(id, 'run', '전송중...');
    try {
      const res = await fetch(TS_GAS_URL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain'},
        body: JSON.stringify({ act:'ts_save', name, pw, chId:id, timestamps: PAYLOAD[id] })
      });
      const data = await res.json();
      if (data.ok) {
        setStatus(id, 'ok', '✓ '+data.count+'개 저장됨');
        log(id+'장 저장 완료 ('+data.count+'개)');
      } else {
        setStatus(id, 'err', '✗ 오류');
        log(id+'장 실패: '+(data.message||'알 수 없는 오류'));
      }
    } catch(e) {
      setStatus(id, 'err', '✗ 통신오류');
      log(id+'장 통신 오류: '+e.message);
    }
  }
  log('전체 동기화 종료');
  document.getElementById('run-btn').disabled = false;
});
</script>
</body>
</html>
